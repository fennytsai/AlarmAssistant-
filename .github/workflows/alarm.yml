name: 掛號提醒
on:

  workflow_dispatch:

  schedule:

    # 每天台灣08:00

    - cron: "0 0 * * *"

jobs:

  reminder:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v5

      - name: Setup Python

        uses: actions/setup-python@v6

        with:

          python-version: "3.11"

      - name: Install

        run: |

          pip install -r requirements.txt

      - name: 執行提醒

        env:

          GOOGLE_CREDENTIALS_JSON:
            ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

          DISCORD_WEBHOOK_URL:
            ${{ secrets.DISCORD_WEBHOOK_URL }}

        run: |

          python reminder.py
